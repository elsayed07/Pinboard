name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run black --check .
      - run: uv run pyright

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pinboard_test
          POSTGRES_USER: pinboard
          POSTGRES_PASSWORD: pinboard
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
          SECRET_KEY: ci-secret-key-not-for-production
          DB_HOST: localhost
        run: uv run python manage.py migrate
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
          SECRET_KEY: ci-secret-key-not-for-production
          DB_HOST: localhost
        run: uv run pytest --cov=apps --cov=shared --cov-report=xml -q
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
