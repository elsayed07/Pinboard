version: "3.9"

x-django-env: &django-env
  env_file: .env
  environment:
    - DJANGO_SETTINGS_MODULE=config.settings.development
    - DB_HOST=db

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pinboard}
      POSTGRES_USER: ${POSTGRES_USER:-pinboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pinboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pinboard}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    <<: *django-env
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: uv run celery -A infrastructure.celery worker --loglevel=info --concurrency=2
    <<: *django-env
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      - django
      - redis
      - db

  celery-beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: uv run celery -A infrastructure.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    <<: *django-env
    volumes:
      - .:/app
    depends_on:
      - celery

volumes:
  postgres_data:
  redis_data:
  media_data:
