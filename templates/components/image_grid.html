{% for image in page.results %}
  {% include "components/image_card.html" %}
{% empty %}
<div class="col-span-full flex flex-col items-center py-24 text-zinc-600">
  <svg class="h-12 w-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
  </svg>
  <p class="text-sm">Nothing here yet.</p>
</div>
{% endfor %}

{% if page.has_next %}
<div
  class="col-span-full flex justify-center mt-6"
  hx-get="?page={{ page.page|add:1 }}"
  hx-trigger="intersect once"
  hx-target="this"
  hx-swap="outerHTML"
>
  <div class="flex gap-2 items-center text-sm text-zinc-500">
    <div class="h-1.5 w-1.5 rounded-full bg-zinc-600 animate-pulse"></div>
    <div class="h-1.5 w-1.5 rounded-full bg-zinc-600 animate-pulse delay-75"></div>
    <div class="h-1.5 w-1.5 rounded-full bg-zinc-600 animate-pulse delay-150"></div>
  </div>
</div>
{% endif %}
