{% load i18n %}
<div class="group relative rounded-2xl overflow-hidden bg-zinc-900 border border-zinc-800 hover:border-brand-500 transition-colors duration-200">
  <a href="{% url 'collection-detail' collection.id %}" class="block">
    <div class="aspect-[4/3] bg-zinc-800 overflow-hidden">
      {% if collection.cover_image %}
        <img
          src="{{ collection.cover_image.image_url }}"
          alt="{{ collection.name }}"
          class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          loading="lazy"
        />
      {% else %}
        <div class="w-full h-full flex items-center justify-center">
          <svg class="w-12 h-12 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        </div>
      {% endif %}
    </div>

    <div class="p-4">
      <div class="flex items-start justify-between gap-2">
        <h3 class="font-semibold text-zinc-100 truncate">{{ collection.name }}</h3>
        {% if collection.is_private %}
          <span class="flex-shrink-0 text-xs px-2 py-0.5 rounded-full bg-zinc-700 text-zinc-400">Private</span>
        {% endif %}
      </div>
      {% if collection.description %}
        <p class="mt-1 text-sm text-zinc-400 line-clamp-2">{{ collection.description }}</p>
      {% endif %}
      <p class="mt-2 text-xs text-zinc-500">{{ collection.images.count }} image{{ collection.images.count|pluralize }}</p>
    </div>
  </a>
</div>
