{% load static %}
<nav class="sticky top-0 z-40 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-md" x-data="{ open: false }">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between gap-6">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center gap-2 shrink-0">
        <div class="h-7 w-7 rounded-lg bg-brand-500 flex items-center justify-center">
          <svg class="h-4 w-4 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
          </svg>
        </div>
        <span class="text-sm font-bold tracking-tight text-white">Pinboard</span>
      </a>

      <!-- Search -->
      <form method="get" action="{% url 'search' %}" class="hidden sm:flex flex-1 max-w-md">
        <div class="relative w-full">
          <svg class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="search" name="q" placeholder="Search images, tags…"
            value="{{ request.GET.q }}"
            class="w-full rounded-xl bg-zinc-900 pl-10 pr-4 py-2 text-sm text-zinc-100 placeholder-zinc-500 border border-zinc-800 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition"
          />
        </div>
      </form>

      <!-- Right actions -->
      <div class="flex items-center gap-3">
        {% if user.is_authenticated %}
          <!-- Add image -->
          <a href="{% url 'upload' %}"
             class="hidden sm:flex items-center gap-1.5 rounded-xl bg-brand-500 hover:bg-brand-600 px-3 py-1.5 text-sm font-medium text-white transition">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add
          </a>

          <!-- Notifications -->
          <a href="{% url 'notifications' %}" class="relative p-2 rounded-lg hover:bg-zinc-800 transition text-zinc-400 hover:text-white">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
          </a>

          <!-- Avatar dropdown -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center gap-2 rounded-xl p-1 hover:bg-zinc-800 transition">
              <img src="{{ user.profile.avatar_url }}" alt="{{ user.username }}"
                   class="h-7 w-7 rounded-full object-cover ring-1 ring-zinc-700" />
            </button>
            <div
              x-show="open" @click.outside="open = false"
              x-transition:enter="transition ease-out duration-100"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              class="absolute right-0 mt-2 w-52 rounded-xl bg-zinc-900 border border-zinc-800 shadow-2xl py-1 z-50"
            >
              <div class="px-3 py-2 border-b border-zinc-800">
                <p class="text-sm font-medium text-white">{{ user.display_name }}</p>
                <p class="text-xs text-zinc-500">@{{ user.username }}</p>
              </div>
              <a href="{% url 'profile' user.username %}" class="flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:text-white hover:bg-zinc-800 transition">
                Profile
              </a>
              <a href="{% url 'discover' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:text-white hover:bg-zinc-800 transition">
                Discover
              </a>
              <a href="{% url 'activity-feed' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:text-white hover:bg-zinc-800 transition">
                Activity
              </a>
              <a href="{% url 'settings' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:text-white hover:bg-zinc-800 transition">
                Settings
              </a>
              <div class="border-t border-zinc-800 mt-1">
                <form method="post" action="{% url 'logout' %}">
                  {% csrf_token %}
                  <button type="submit" class="w-full text-left px-3 py-2 text-sm text-red-400 hover:text-red-300 hover:bg-zinc-800 transition">
                    Sign out
                  </button>
                </form>
              </div>
            </div>
          </div>

        {% else %}
          <a href="{% url 'login' %}" class="text-sm text-zinc-400 hover:text-white transition">Sign in</a>
          <a href="{% url 'register' %}"
             class="rounded-xl bg-brand-500 hover:bg-brand-600 px-3 py-1.5 text-sm font-medium text-white transition">
            Get started
          </a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
