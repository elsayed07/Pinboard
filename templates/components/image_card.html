<article class="group relative overflow-hidden rounded-2xl bg-zinc-900 border border-zinc-800 hover:border-zinc-700 transition-all duration-300 hover:shadow-2xl hover:shadow-brand-500/10">
  <a href="{% url 'image-detail' image.slug %}" class="block">
    {% if image.thumbnail %}
    <img
      src="{{ image.thumbnail.url }}"
      alt="{{ image.title }}"
      loading="lazy"
      class="w-full object-cover aspect-[4/3] group-hover:scale-105 transition-transform duration-500"
    />
    {% else %}
    <div class="w-full aspect-[4/3] bg-zinc-800 flex items-center justify-center">
      <svg class="h-10 w-10 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
    </div>
    {% endif %}
  </a>

  <div class="p-3">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0">
        <a href="{% url 'image-detail' image.slug %}" class="block text-sm font-medium text-zinc-100 hover:text-white truncate leading-tight">
          {{ image.title }}
        </a>
        <a href="{% url 'profile' image.owner.username %}" class="text-xs text-zinc-500 hover:text-zinc-400 transition mt-0.5 inline-block">
          @{{ image.owner.username }}
        </a>
      </div>

      {% if user.is_authenticated %}
      <form
        method="post"
        action="{% url 'like' image.id %}"
        hx-post="{% url 'like' image.id %}"
        hx-target="this"
        hx-swap="outerHTML"
        class="shrink-0"
      >
        {% csrf_token %}
        <button type="submit" class="flex items-center gap-1 text-xs text-zinc-500 hover:text-red-400 transition">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
          {{ image.like_count }}
        </button>
      </form>
      {% else %}
      <span class="flex items-center gap-1 text-xs text-zinc-600 shrink-0">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        {{ image.like_count }}
      </span>
      {% endif %}
    </div>

    {% if image.tags.all %}
    <div class="flex flex-wrap gap-1 mt-2">
      {% for tag in image.tags.all|slice:":3" %}
      <a href="{% url 'search' %}?tag={{ tag.slug }}"
         class="text-xs px-1.5 py-0.5 rounded-md bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-zinc-300 transition">
        #{{ tag.name }}
      </a>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</article>
