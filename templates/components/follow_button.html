{% if user.is_authenticated and user != profile_user %}
  {% if is_following %}
  <form method="post" action="{% url 'unfollow' profile_user.username %}"
        hx-post="{% url 'unfollow' profile_user.username %}"
        hx-target="this" hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
      class="rounded-xl border border-zinc-700 px-4 py-1.5 text-sm font-medium text-zinc-300 hover:border-red-500 hover:text-red-400 transition">
      Following
    </button>
  </form>
  {% else %}
  <form method="post" action="{% url 'follow' profile_user.username %}"
        hx-post="{% url 'follow' profile_user.username %}"
        hx-target="this" hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
      class="rounded-xl bg-brand-500 hover:bg-brand-600 px-4 py-1.5 text-sm font-medium text-white transition">
      Follow
    </button>
  </form>
  {% endif %}
{% endif %}
