{% extends "base.html" %}
{% block title %}Check your email — Pinboard{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm text-center">
    <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-brand-500/10">
      <svg class="h-8 w-8 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">Check your email</h1>
    <p class="mt-2 text-sm text-zinc-400">
      If an account exists for that address, we've sent a password reset link.
      It may take a minute to arrive.
    </p>
    <a href="{% url 'login' %}"
       class="mt-6 inline-block text-sm text-brand-500 hover:text-brand-400 font-medium transition">
      Back to sign in
    </a>
  </div>
</div>
{% endblock %}
