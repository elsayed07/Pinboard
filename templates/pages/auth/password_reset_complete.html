{% extends "base.html" %}
{% block title %}Password updated — Pinboard{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm text-center">
    <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-green-500/10">
      <svg class="h-8 w-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">Password updated</h1>
    <p class="mt-2 text-sm text-zinc-400">Your password has been changed. You can now sign in with your new password.</p>
    <a href="{% url 'login' %}"
       class="mt-6 inline-block rounded-xl bg-brand-500 hover:bg-brand-600 px-6 py-2.5 text-sm font-semibold text-white transition">
      Sign in
    </a>
  </div>
</div>
{% endblock %}
