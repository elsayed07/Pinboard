{% extends "base.html" %}
{% block title %}Your Feed — Pinboard{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-white">Your Feed</h1>
      <p class="text-sm text-zinc-500 mt-0.5">Images from people you follow</p>
    </div>
    <div class="flex gap-2">
      <a href="{% url 'bookmark' %}"
         class="flex items-center gap-1.5 rounded-xl border border-zinc-800 hover:border-zinc-700 px-3 py-1.5 text-sm text-zinc-400 hover:text-white transition">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
        Bookmark URL
      </a>
      <a href="{% url 'upload' %}"
         class="flex items-center gap-1.5 rounded-xl bg-brand-500 hover:bg-brand-600 px-3 py-1.5 text-sm font-medium text-white transition">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Upload
      </a>
    </div>
  </div>

  <div id="image-grid"
       class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"
       hx-get="{% url 'home' %}?page=1"
       hx-trigger="load"
       hx-swap="innerHTML">
    {% include "components/image_grid.html" with page=page %}
  </div>
</div>
{% endblock %}
