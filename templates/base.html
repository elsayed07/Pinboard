<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pinboard{% endblock %}</title>
  <meta name="description" content="{% block description %}Discover and bookmark the world's most inspiring images.{% endblock %}" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#7c3aed', 600: '#6d28d9', 700: '#5b21b6' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  {% block extra_head %}{% endblock %}
</head>
<body class="h-full text-zinc-100 antialiased" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  {% include "components/navbar.html" %}

  {% if messages %}
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2" x-data>
    {% for message in messages %}
    <div
      x-data="{ show: true }"
      x-show="show"
      x-init="setTimeout(() => show = false, 3500)"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-x-4"
      x-transition:enter-end="opacity-100 translate-x-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-end="opacity-0 translate-x-4"
      class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium
        {% if message.tags == 'error' %}bg-red-500/90 text-white
        {% elif message.tags == 'success' %}bg-emerald-500/90 text-white
        {% else %}bg-zinc-800 text-zinc-100{% endif %}"
    >
      {{ message }}
      <button @click="show = false" class="ml-2 opacity-70 hover:opacity-100">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="min-h-[calc(100vh-4rem)]">
    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
